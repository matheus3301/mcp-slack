name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow only needs to read the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: build, test & security
    runs-on: ubuntu-latest
    env:
      # Tool versions kept in lockstep with the Makefile.
      STATICCHECK_VERSION: v0.7.0
      GOVULNCHECK_VERSION: v1.6.0
      GOSEC_VERSION: v2.28.0
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Verify formatting
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: staticcheck
        run: go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

      - name: gosec
        run: go run "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}" -exclude-dir=.tools ./...

      - name: govulncheck
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...

      - name: Reproducible Linux build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X main.version=ci-${GITHUB_SHA}" -o dist/mcp-slack ./cmd/mcp-slack
